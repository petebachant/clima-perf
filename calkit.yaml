owner: petebachant
name: clima-perf
title: CliMA performance
description: Tracking CliMA performance over time.
git_repo_url: https://github.com/petebachant/clima-perf

environments:
  main:
    path: envs/main.txt
    kind: uv-venv
    prefix: .calkit/venvs/main/.venv
    python: "3.14"
  analyze:
    path: envs/analyze.txt
    kind: uv-venv
    prefix: .calkit/venvs/analyze/.venv
    python: "3.14"
  bk:
    path: envs/bk.txt
    kind: uv-venv
    prefix: .calkit/venvs/bk/.venv
    python: "3.14"
  clima:
    kind: slurm
    host: clima.gps.caltech.edu
    default_setup:
      - module purge
      - module load climacommon/2025_05_15
    default_options:
      - --gpus=1
      - --time=120

pipeline:
  stages:
    benchmark-amip:
      frozen: true # Was run in a previous form; no need to run again
      kind: python-script
      environment: clima:main
      scheduler:
        log_path: runs/amip/{date}/output.log
      script_path: scripts/run.py
      args:
        - --date="{date}"
      inputs:
        - repos/ClimaCoupler.jl/toml/amip_progedmf_1m.toml
        - repos/ClimaCoupler.jl/config/atmos_configs/climaatmos_progedmf_1m.yml
        - repos/ClimaCoupler.jl/config/benchmark_configs/amip_progedmf_1m_land_he16.yml
      outputs:
        - path: runs/amip/{date}/Manifest-v1.11.toml
          storage: git
          delete_before_run: true
        - path: runs/amip/{date}/repo-revs.json
          storage: git
          delete_before_run: true
      iterate_over:
        - arg_name: date
          values:
            # - "2025-10-15" # Fails
            - "2025-11-01"
            - "2025-11-02"
            - "2025-11-03"
            - "2025-11-04"
            # - "2025-11-07" # Fails
            # - "2025-11-14" # Fails
            # - "2025-12-01" # Fails
            - "2025-12-06"
            - "2025-12-20"
            - "2025-12-27"
            # - "2026-01-01" # Fails
            # - "2026-01-06" # Fails
            - "2026-01-13"
    fetch-buildkite:
      kind: jupyter-notebook
      environment: bk
      notebook_path: notebooks/buildkite.ipynb
      always_run: true
      html_storage: git
      executed_ipynb_storage: git
      outputs:
        - path: buildkite
          delete_before_run: false
          storage: git
    fetch-github:
      description: Fetch GitHub releases, stars, issues, PRs, forks data on
        a weekly basis.
      kind: shell-script
      script_path: scripts/fetch-github.sh
      environment: gh-cli
      always_run: true
      outputs:
        - path: data/github
          storage: git
          delete_before_run: false
    fetch-citations:
      description: Fetch CliMA publication and citation data.
      kind: python-script
      environment: TODO
      script_path: scripts/fetch-citations.py
      always_run: true
      outputs:
        - path: data/openalex
          storage: git
          delete_before_run: false
    analyze:
      kind: jupyter-notebook
      environment: analyze
      notebook_path: notebooks/analyze.ipynb
      html_storage: git
      executed_ipynb_storage: git
      inputs:
        - runs/amip
        - buildkite
      outputs:
        - path: results/amip.csv
          storage: git
        - path: results/amip-repo-diff-links.md
          storage: git
        - path: figures/amip-speedup.png
          storage: git
        - path: figures/amip-speedup.json
          storage: git

figures:
  - path: figures/amip-speedup.json
    title: Flagship AMIP speedup
    description: Flagship AMIP benchmark (16 horiz. elem.) SYPD over time
      normalized by the start of performance tracking.
    stage: analyze

notebooks:
  - path: notebooks/analyze.ipynb
    title: Analysis
    description: Analyze and plot the flagship AMIP benchmark (16 horiz.
      elem.) SYPD over time.
    stage: analyze
  - path: notebooks/buildkite.ipynb
    title: Fetch Buildkite jobs from their API
    description: Fetch Buildkite benchmark data for comparison.
    stage: fetch-buildkite
  - path: notebooks/main.ipynb
    title: Main dev notebook
    description: This was used to develop the run.py script.
    environment: main

showcase:
  - figure: figures/amip-speedup.json
  - markdown_file: results/amip-repo-diff-links.md

datasets:
  - path: results/amip.csv
    title: Flagship AMIP benchmark results
    description: Results from the flagship AMIP benchmark (16 horiz. elem.)
      over time.
    stage: analyze
  - path: buildkite
    title: Buildkite flagship AMIP jobs
    description: Job info and raw logs from Buildkite for the flagship AMIP
      benchmark.
    stage: fetch-buildkite
  - path: runs/amip
    title: Raw AMIP benchmark runs
    description: Raw outputs (logs, manifests, repo revisions used) from
      the flagship AMIP benchmark runs.
    stage: benchmark-amip
