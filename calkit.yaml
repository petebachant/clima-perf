owner: petebachant
name: clima-perf
title: CliMA performance
description: Tracking CliMA performance over time.
git_repo_url: https://github.com/petebachant/clima-perf

dependencies:
  - pixi
  - kind: setup
    name: GitHub CLI access
    check_command: calkit xenv -n clima-data -- gh auth status
    setup_command: calkit xenv -n clima-data -- gh auth login
    description: >
      The fetch-github stage uses the gh CLI to pull data from CliMA org
      repos. Run this once locally to authenticate. On GitHub Actions the
      run-pipeline workflow sets GH_TOKEN from the workflow's GITHUB_TOKEN,
      so no interactive login is needed there.
  - kind: env-var
    name: BUILDKITE_PAT
    description: Buildkite personal access token.

environments:
  main:
    path: envs/main.txt
    kind: uv-venv
    prefix: .calkit/venvs/main/.venv
    python: "3.14"
  analyze:
    path: envs/analyze.txt
    kind: uv-venv
    prefix: .calkit/venvs/analyze/.venv
    python: "3.14"
  bk:
    path: envs/bk.txt
    kind: uv-venv
    prefix: .calkit/venvs/bk/.venv
    python: "3.14"
  clima-data:
    # Pixi env (under .calkit/envs/) with gh + jq + python so both
    # fetch-github.py (subprocess gh) and fetch-citations.py (requests +
    # pyyaml) run in one environment.
    kind: pixi
    path: .calkit/envs/clima-data/pixi.toml
  clima:
    kind: slurm
    host: clima.gps.caltech.edu
    default_setup:
      - module purge
      - module load climacommon/2025_05_15
    default_options:
      - --gpus=1
      - --time=120

pipeline:
  stages:
    benchmark-amip:
      frozen: true # Was run in a previous form; no need to run again
      kind: python-script
      environment: clima:main
      scheduler:
        log_path: runs/amip/{date}/output.log
      script_path: scripts/run.py
      args:
        - --date="{date}"
      inputs:
        - repos/ClimaCoupler.jl/toml/amip_progedmf_1m.toml
        - repos/ClimaCoupler.jl/config/atmos_configs/climaatmos_progedmf_1m.yml
        - repos/ClimaCoupler.jl/config/benchmark_configs/amip_progedmf_1m_land_he16.yml
      outputs:
        - path: runs/amip/{date}/Manifest-v1.11.toml
          storage: git
          delete_before_run: true
        - path: runs/amip/{date}/repo-revs.json
          storage: git
          delete_before_run: true
      iterate_over:
        - arg_name: date
          values:
            # - "2025-10-15" # Fails
            - "2025-11-01"
            - "2025-11-02"
            - "2025-11-03"
            - "2025-11-04"
            # - "2025-11-07" # Fails
            # - "2025-11-14" # Fails
            # - "2025-12-01" # Fails
            - "2025-12-06"
            - "2025-12-20"
            - "2025-12-27"
            # - "2026-01-01" # Fails
            # - "2026-01-06" # Fails
            - "2026-01-13"
    fetch-buildkite:
      kind: jupyter-notebook
      environment: bk
      notebook_path: notebooks/buildkite.ipynb
      always_run: true
      html_storage: git
      executed_ipynb_storage: git
      outputs:
        - path: buildkite
          delete_before_run: false
          storage: git
    fetch-github:
      description: >
        Incrementally fetch CliMA-org GitHub data (PRs, issues, repo stats,
        forks, releases, Project.toml commits, repo creation dates) up to
        the start of the current UTC day. Resumes from the latest
        previously-fetched timestamp on each run.
      kind: python-script
      script_path: scripts/fetch-github.py
      environment: clima-data
      always_run: true
      outputs:
        - path: data/github
          storage: git
          delete_before_run: false
    fetch-registry:
      description: >
        Clone JuliaRegistries/General and update a single dependents.jsonl
        event log per (clima_package, dependent) pair, tracking
        first_seen_at + last_seen_at. First run does a full-history clone
        and backfills first_seen_at from git log; subsequent runs use a
        shallow clone. No-ops if today's UTC day has already been processed.
      kind: python-script
      script_path: scripts/fetch-registry.py
      environment: clima-data
      always_run: true
      outputs:
        - path: data/julia-registry
          storage: git
          delete_before_run: false
    fetch-citations:
      description: >
        Parse every entry on https://clima.caltech.edu/publications/, resolve
        each to an OpenAlex work (DOI lookup or title+year search), and
        snapshot the citation graph as four normalized JSONL tables
        (clima-pubs, citing-pubs, citations, authors) under data/openalex/.
        No-ops once the marker records the current UTC day. Internal-vs-
        external classification and package grouping happen in the analyze
        notebook.
      kind: python-script
      script_path: scripts/fetch-citations.py
      environment: clima-data
      always_run: true
      outputs:
        - path: data/openalex
          storage: git
          delete_before_run: false
    analyze:
      kind: jupyter-notebook
      environment: analyze
      notebook_path: notebooks/analyze.ipynb
      html_storage: git
      executed_ipynb_storage: git
      inputs:
        - runs/amip
        - buildkite
        - data/github
        - data/openalex
        - data/julia-registry
      outputs:
        - path: results/amip.csv
          storage: git
        - path: results/amip-repo-diff-links.md
          storage: git
        - path: figures/amip-speedup.json
          storage: git
        - path: figures/external-engagement.json
          storage: git
        - path: results/external-citations.csv
          storage: git
        - path: results/github-engagement.csv
          storage: git
        - path: results/new-registry-dependents.csv
          storage: git
    analyze-dev-speed:
      description: Analyze things like PR resolution speed to see
        changes over time.
      kind: jupyter-notebook
      notebook_path: notebooks/analyze-dev-speed.ipynb
      environment: analyze
      html_storage: git
      executed_ipynb_storage: git
      inputs:
        - data/github
      outputs:
        - path: results/pr-ttm.csv
          storage: git
        - path: figures/dev-throughput.json
          storage: git

figures:
  - path: figures/amip-speedup.json
    title: Flagship AMIP speedup
    description: Flagship AMIP benchmark (16 horiz. elem.) SYPD over
      time normalized by the start of performance tracking.
    stage: analyze
  - path: figures/external-engagement.json
    title: External engagement
    description: External engagement with CliMA's products on a
      quarterly basis.
    stage: analyze
  - path: figures/dev-throughput.json
    title: Software development throughput
    stage: analyze-dev-speed
    description: Quarterly development throughput across CliMA's
      ecosystem. Pull request time-to-merge (p50 and p90), PR merge
      rate, and release rate. There is one trace per repository; the
      thick gray line is the ecosystem-wide value (normalized to a
      per-repo average on the count-based panels).

notebooks:
  - path: notebooks/analyze.ipynb
    title: Analysis
    description: Analyze and plot the flagship AMIP benchmark (16
      horiz. elem.) SYPD over time.
    stage: analyze
  - path: notebooks/buildkite.ipynb
    title: Fetch Buildkite jobs from their API
    description: Fetch Buildkite benchmark data for comparison.
    stage: fetch-buildkite
  - path: notebooks/main.ipynb
    title: Main dev notebook
    description: This was used to develop the run.py script.
    environment: main

showcase:
  - figure: figures/amip-speedup.json
  - markdown_file: results/amip-repo-diff-links.md

datasets:
  - path: results/amip.csv
    title: Flagship AMIP benchmark results
    description: Results from the flagship AMIP benchmark (16 horiz.
      elem.) over time.
    stage: analyze
  - path: results/external-citations.csv
    title: External citation events
    description: One row per external citing work (OpenAlex), tagged
      with the cited CliMA paper's DOI + software package (if any) and
      the citing work's quarter. Internal self-citations (any author
      shared with any scraped CliMA paper) are excluded.
    stage: analyze
  - path: results/github-engagement.csv
    title: GitHub engagement events
    description: One row per external star / fork / opened issue /
      merged PR (login is non-CliMA-org, non-bot), with repo, event
      type, login, timestamp, and quarter.
    stage: analyze
  - path: results/new-registry-dependents.csv
    title: New external Julia-registry dependents
    description: One row per (CliMA package, external dependent) pair,
      with the dependent's repo URL and the quarter when it first
      appeared in the Julia General registry as a dependent.
    stage: analyze
  - path: buildkite
    title: Buildkite flagship AMIP jobs
    description: Job info and raw logs from Buildkite for the flagship
      AMIP benchmark.
    stage: fetch-buildkite
  - path: runs/amip
    title: Raw AMIP benchmark runs
    description: Raw outputs (logs, manifests, repo revisions used)
      from the flagship AMIP benchmark runs.
    stage: benchmark-amip
  - path: results/pr-ttm.csv
    title: Pull request time-to-merge
    description: Quarterly median time-to-merge for pull requests
      across CliMA's GitHub repos.
    stage: analyze-dev-speed
